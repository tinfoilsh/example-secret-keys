name: Release (measure + attest)

# Tag this repo (vX.Y.Z) to measure the deployment and publish a sigstore
# attestation under THIS repo — the secrets server checks that attestation
# against the workload's SEV-SNP quote before releasing secrets.
on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          persist-credentials: false

      - name: Measure, attest, and release
        uses: tinfoilsh/measure-image-action@v0.8.2
        with:
          config-file: tinfoil-config.yml
          github-token: ${{ github.token }}
