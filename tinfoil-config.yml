cvm-version: "0.0.0-dev-secrets.1"

cpus: 4
memory: 4096

# Attested location of the user-managed secrets vault. The host can't
# redirect this without breaking the measurement. The enclave verifies this
# host's public TLS certificate (Let's Encrypt, via Caddy) against the system
# roots, so it can't be MITM'd onto a different vault.
vault-url: "https://dev-vault.tinfoil.sh"

shim:
  upstream-port: 8080
  tls-mode: self-signed

containers:
  - name: "example-secret-keys"
    image: "docker.io/library/nginx:alpine"
    restart: always
    read_only: false
    cap_add: ["CHOWN", "SETUID", "SETGID", "DAC_OVERRIDE", "KILL"]
    secrets: [EXAMPLE_KEY]
    command:
      - /bin/sh
      - -c
      - |
        echo "example-secret-keys: EXAMPLE_KEY len=${#EXAMPLE_KEY}"
        cat > /etc/nginx/conf.d/default.conf <<EOF
        server {
          listen 8080 default_server;
          location /health       { return 200 'ok\n'; }
          location /secret-check { return 200 'EXAMPLE_KEY len=${#EXAMPLE_KEY}\n'; }
        }
        EOF
        nginx -g 'daemon off;'
